services:
  app:
    build:
      context: .
      args:
        DATABASE_URL: postgresql://teems:teems@db:5432/teems
        JWT_SECRET: ${JWT_SECRET:-teems-production-secret-change-me}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://teems:teems@db:5432/teems
      JWT_SECRET: ${JWT_SECRET:-teems-production-secret-change-me}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@teems.momentumworld.me}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://teems.momentumworld.me}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    volumes:
      - uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: teems
      POSTGRES_USER: teems
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teems}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teems"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backup:
    image: postgres:16-alpine
    environment:
      DATABASE_URL: postgresql://teems:${POSTGRES_PASSWORD:-teems}@db:5432/teems
      BACKUP_DIR: /backups
    volumes:
      - backups:/backups
      - ./scripts/backup.sh:/scripts/backup.sh:ro
    entrypoint: /bin/sh
    command: ["-c", "while true; do /scripts/backup.sh; sleep 86400; done"]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  backups:
